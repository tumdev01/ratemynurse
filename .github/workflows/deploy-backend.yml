name: Deploy Laravel Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/laravel/**'
  workflow_dispatch: {}

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DO_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync backend/laravel to server
        run: |
          # ห้ามลบ --exclude='public/images' ออกเด็ดขาด — โฟลเดอร์นี้เก็บรูปที่ user อัปโหลดจริงบน production
          # (gitignore ไว้ตั้งแต่แรก ไม่อยู่ใน git เลย) --delete จะลบไฟล์เหล่านี้ทิ้งถ้าไม่ exclude
          # (เกิดขึ้นจริงแล้ว 2026-07-17: รูปกว่า 4,200 ไฟล์หายไปตอน rsync รันสำเร็จครั้งแรกหลังแก้ SSH
          # secrets กู้คืนได้เกือบหมดจาก local docker ที่ยังมีไฟล์อยู่ครบ แต่ต้องไม่ให้เกิดซ้ำอีกเด็ดขาด)
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='.git' \
            --exclude='vendor' \
            --exclude='node_modules' \
            --exclude='storage' \
            --exclude='bootstrap/cache' \
            --exclude='public/images' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            backend/laravel/ "${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}:/root/ratemynurse/backend/laravel/"

      - name: Post-deploy (composer install, clear caches)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}" '
            set -e
            docker exec rmn_laravel_backend composer install --no-dev --optimize-autoloader --no-interaction
            docker exec rmn_laravel_backend php artisan config:clear
            docker exec rmn_laravel_backend php artisan cache:clear
            docker exec rmn_laravel_backend php artisan route:clear
          '
          # migrate --force ถูกตัดออกชั่วคราว — production มี migration ค้าง 26 ตัวที่ table จริงมีอยู่แล้ว
          # (schema drift สะสมจากการแก้ DB ตรงๆ/หลายเครื่องมาก่อน) ต้อง audit ทีละตัวก่อนเปิดใช้อีกครั้ง
          #
          # notifications.category ถูกเพิ่มด้วย raw SQL ตรงบน production แล้ว (deploy/add_notifications_category_column.sql)
          # ไม่ได้บันทึกลงตาราง migrations — ถ้าใครเผลอเพิ่ม step รัน migrate --path ของไฟล์นี้อีกจะ error
          # "column already exists" ทันที
